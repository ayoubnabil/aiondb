name: Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

permissions:
  contents: read
  packages: write

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  release-bundle:
    name: Release Bundle
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
      - uses: dtolnay/rust-toolchain@bd41891a8e7f4b8649f6d684415e1a6155fe4e22 # 1.83.0
      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2
      - name: Build and verify release artifacts
        run: make release-local
      - name: Upload release artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: aiondb-release-artifacts
          path: target/release-artifacts/
          if-no-files-found: error
          retention-days: 30

  docker-images:
    name: Docker Images
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: aiondb
            context: .
          - name: aiondb-studio
            context: ./integrations/aiondb-studio
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
      - name: Compute image metadata
        id: meta
        shell: bash
        run: |
          image_repo="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/${{ matrix.name }}"
          sha_tag="sha-${GITHUB_SHA::12}"
          tags=("$image_repo:$sha_tag")
          if [[ "$GITHUB_REF_TYPE" == "branch" && "$GITHUB_REF_NAME" == "main" ]]; then
            tags+=("$image_repo:main")
          fi
          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            tags+=("$image_repo:$GITHUB_REF_NAME")
          fi
          {
            echo "image_repo=$image_repo"
            echo "tags<<EOF"
            printf '%s\n' "${tags[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      - name: Build image
        shell: bash
        run: |
          build_args=()
          while IFS= read -r tag; do
            build_args+=("-t" "$tag")
          done <<< "${{ steps.meta.outputs.tags }}"
          docker build "${build_args[@]}" "${{ matrix.context }}"
      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
      - name: Push image
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          while IFS= read -r tag; do
            docker push "$tag"
          done <<< "${{ steps.meta.outputs.tags }}"
